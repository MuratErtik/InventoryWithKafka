apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: inventory-with-kafka
  source:
    repoURL: https://github.com/MuratErtik/InventoryWithKafka
    path: charts/postgres
    targetRevision: "HEAD"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
---
