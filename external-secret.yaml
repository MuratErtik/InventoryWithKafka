apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: database
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: cubbyhole/database
        property: password
    - secretKey: username
      remoteRef:
        key: cubbyhole/database
        property: username